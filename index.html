<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The most powerful laptop yet</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header>
      <nav>
        <div class="logo" id="logo"></div>
        <div class="burger">
          <div class="line"></div>
          <div class="line"></div>
          <div class="line"></div>
        </div>
      </nav>
    </header>
    <img src="./laptop.png" id="laptop" alt="laptop" />
    <script src="./app.js"></script>
    <img class="big-circle" src="./img/big-eclipse.svg" alt="circle" />
    <img class="medium-circle" src="./img/mid-eclipse.svg" alt="circle" />
    <img class="small-circle" src="./img/small-eclipse.svg" alt="circle" />
    <section class="presentation">
      <div class="introduction">
        <div class="intro-text">
          <h1>Laptop for the future</h1>
          <p>
            The new 16 inch bezeless display oferring a great
            <br>
            display with phenomenal performance.
          </p>
        </div>
        <div class="cta">
          <button class="cta-select">14 Inch</button>
          <button class="cta-add">Add To Cart</button>
        </div>
      </div>
    </section>
  </body>
</html>
